services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    working_dir: /app/apps/nextjs
    environment:
      NODE_ENV: development
      DOCKER: "1"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nextjs-boilerplate
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    command: >
      sh -c "pnpm db:generate && pnpm dev"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .git/
            - node_modules/
            - apps/nextjs/node_modules/
            - apps/nextjs/.next/
        - action: rebuild
          path: Dockerfile.dev
        - action: rebuild
          path: package.json
        - action: rebuild
          path: pnpm-lock.yaml
        - action: rebuild
          path: apps/nextjs/package.json
    ports:
      # Use NEXTJS_PORT to override the default stable host port.
      - target: 3000
        published: "${NEXTJS_PORT:-3000}"
        protocol: tcp
    volumes:
      - root_node_modules:/app/node_modules
      - nextjs_node_modules:/app/apps/nextjs/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nextjs-boilerplate
    ports:
      # Use POSTGRES_PORT to override the default stable host port.
      - target: 5432
        published: "${POSTGRES_PORT:-5432}"
        protocol: tcp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      # Use PGADMIN_PORT to override the default stable host port.
      - target: 80
        published: "${PGADMIN_PORT:-5050}"
        protocol: tcp
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  root_node_modules:
  nextjs_node_modules:
  postgres_data:
  pgadmin_data:
